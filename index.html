<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고린도전서 13장 암송 체크</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;600;800&display=swap');
  :root{
    --ink:#1a1714;--paper:#f7f3ec;--surface:#fffdf8;--line:#e3d8c7;
    --gold:#d4a84b;--muted:#827666;--mic:#c0392b;
    --ok:#2f7a4f;--ok-bg:#eef8f1;--bad:#9a392b;--bad-bg:#fff0ec;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .app{
    width:min(680px,100%);background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:18px;
  }
  .title{text-align:center}
  .title h1{font-family:'Noto Serif KR',serif;font-size:24px;color:var(--ink);margin-bottom:5px}
  .title p{font-size:13px;color:var(--muted)}
  .mic-ring{
    width:132px;height:132px;border:0;border-radius:50%;background:var(--ink);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 6px 24px rgba(0,0,0,.2);transition:transform .15s, background .2s;
  }
  .mic-ring:hover{transform:scale(1.035)}
  .mic-ring.listening{background:var(--mic);animation:pulse 1.2s infinite}
  .mic-icon{font-size:50px;color:var(--gold);user-select:none}
  .mic-ring.listening .mic-icon{color:#fff}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.38)}
    50%{box-shadow:0 0 0 24px rgba(192,57,43,0)}
  }
  .timer{
    font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;
    color:var(--ink);letter-spacing:0;
  }
  .status{
    width:100%;min-height:58px;border-radius:12px;padding:15px 18px;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font-size:18px;font-weight:800;line-height:1.5;background:var(--paper);color:var(--muted);
  }
  .status.on{color:var(--mic)}
  .status.ok{background:var(--ok-bg);color:var(--ok)}
  .status.bad{background:var(--bad-bg);color:var(--bad)}
  .recognized{
    width:100%;min-height:96px;border:1.5px dashed var(--line);border-radius:12px;
    background:var(--paper);padding:18px;font-family:'Noto Serif KR',serif;
    font-size:20px;line-height:1.8;text-align:center;color:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .recognized.empty{font-family:'Noto Sans KR',sans-serif;font-size:15px;color:#b7a894}
  .recognized.ok{border-color:#acd8bb;background:var(--ok-bg);color:var(--ok)}
  .recognized.bad{border-color:#e8b7aa;background:var(--bad-bg);color:var(--bad)}
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .small-btn{
    border:1px solid var(--line);background:transparent;color:var(--muted);
    border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;
  }
  .small-btn:hover{background:var(--line);color:var(--ink)}
  .no-support{display:none;color:var(--bad);font-size:14px;text-align:center;line-height:1.7}
  @media(max-width:560px){
    body{padding:14px}.app{padding:22px}.mic-ring{width:116px;height:116px}
    .timer{font-size:30px}.status{font-size:16px}.recognized{font-size:18px}
  }
</style>
</head>
<body>
<main class="app">
  <div class="title">
    <h1>고린도전서 13장</h1>
    <p>계속 암송하세요. 틀리면 소리로 알려주고 바로 다시 듣습니다.</p>
  </div>

  <button class="mic-ring" id="micBtn" onclick="toggleMic()" aria-label="마이크 시작">
    <span class="mic-icon">🎙️</span>
  </button>

  <div class="timer" id="timer">00:00</div>
  <div class="status" id="status">마이크를 누르면 시작합니다</div>
  <div class="recognized empty" id="recognized">말씀을 말하면 여기에 짧게 표시됩니다</div>

  <div class="controls">
    <button class="small-btn" onclick="clearAttempt()">인식문장 지우기</button>
    <button class="small-btn" onclick="resetAll()">처음부터</button>
  </div>

  <div class="no-support" id="noSupport">이 브라우저는 음성인식을 지원하지 않습니다. Chrome 또는 Edge 브라우저를 사용해주세요.</div>

    const correctedTarget = CORRECTION_TARGETS[target] || target;
    variants.forEach(variant => {
      map[normalizeKoreanText(variant)] = correctedTarget;
    });
    return map;
  }, {});
}

function buildCorrectionPhrases(groups){
  const contextWords = new Set([
    '되고','행하지','사랑','사랑은','예언','예언도','않고','아니하되','아니하대','아니하돼',
    '없느니라','없으니라','없느라','업느니라','없는이라','내줄지라도','우리는','우리가',
    '지식','지식도','그때에는','그때는','볼','것이요','볼거이요','볼거요','것이며','것이오',
    '알리라','알이라','알리요','그런즉','그런','즉','있을','것인데','있을건데','것인대',
    '것','인데','건데','사랑이라','사랑이다','사랑이야','이라'
  ]);
  const phrases = [];
  Object.entries(groups).forEach(([target, variants]) => {
    const correctedTarget = CORRECTION_TARGETS[target] || target;
    variants.forEach(variant => {
      const words = splitKoreanWords(variant);
      const looksLikeContext = words.some(word => contextWords.has(normalizeKoreanText(word)));
      const closeToTarget = normalizeKoreanText(variant).length <= normalizeKoreanText(correctedTarget).length + 2;
      if(words.length > 1 && closeToTarget && !looksLikeContext){
        phrases.push({ variant, target: correctedTarget });
      }
    });
  });
  return phrases.sort((a, b) => normalizeKoreanText(b.variant).length - normalizeKoreanText(a.variant).length);
}

function buildAnswerContext(phrase){
  const phraseNorm = normalizeKoreanText(phrase);
  const phraseWords = splitKoreanWords(phrase);
  const start = FULL_WORDS.findIndex((_, index) => {
    return normalizeKoreanText(FULL_WORDS.slice(index, index + phraseWords.length).join(' ')) === phraseNorm;
  });
  if(start < 0) return null;
  return {
    phrase,
    start,
    words: FULL_WORDS.slice(start, start + phraseWords.length)
  };
}

function buildVerseContexts(verses){
  let cursor = 0;
  return verses.map((text, index) => {
    const words = splitKoreanWords(text);
    const start = FULL_WORDS.findIndex((_, wordIndex) => {
      if(wordIndex < cursor) return false;
      return normalizeKoreanText(FULL_WORDS.slice(wordIndex, wordIndex + words.length).join(' ')) === normalizeKoreanText(text);
    });
    if(start >= 0) cursor = start + words.length;
    return {
      index,
      text,
      words,
      start: Math.max(0, start),
      norm: normalizeKoreanText(text)
    };
  });
}

function buildTargetSegments(words, baseStart=0){
  const segments = [];
  const maxLength = Math.min(28, words.length);
  for(let length = 1; length <= maxLength; length++){
    for(let start = 0; start <= words.length - length; start++){
      const text = words.slice(start, start + length).join(' ');
      segments.push({
        start: baseStart + start,
        text,
        words: words.slice(start, start + length),
        norm: normalizeKoreanText(text)
      });
    }
  }
  segments.push({ start: baseStart, text: words.join(' '), words, norm: normalizeKoreanText(words.join(' ')) });
  return segments;
}

function getTargetWindow(index=currentVerseIndex){
  const from = Math.min(Math.max(0, index), VERSE_CONTEXTS.length - 1);
  const to = Math.min(VERSE_CONTEXTS.length - 1, from + 1);
  const cacheKey = `${from}-${to}`;
  if(targetWindowCache[cacheKey]) return targetWindowCache[cacheKey];
  const words = VERSE_CONTEXTS.slice(from, to + 1).flatMap(verse => verse.words);
  const baseStart = VERSE_CONTEXTS[from]?.start || 0;
  targetWindowCache[cacheKey] = {
    from,
    to,
    words,
    segments: buildTargetSegments(words, baseStart)
  };
  return targetWindowCache[cacheKey];
}

function escapeRegExp(text){
  return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function isAllowedPhraseTarget(target, allowedNorms){
  if(!allowedNorms) return true;
  return splitKoreanWords(target).every(word => {
    const wordNorm = normalizeKoreanText(word);
    return allowedNorms.has(wordNorm) || isAllowedCorrection(wordNorm, allowedNorms);
  });
}

function applyPhraseCorrections(text, allowedNorms=FULL_WORD_NORMS){
  let corrected = text.replace(/[^\uAC00-\uD7A3a-zA-Z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();

  Object.entries(PHRASE_CORRECTION_MAP)
    .sort((a, b) => normalizeKoreanText(b[0]).length - normalizeKoreanText(a[0]).length)
    .forEach(([variant, target]) => {
      if(!isAllowedPhraseTarget(target, allowedNorms)) return;
      const words = splitKoreanWords(variant);
      const pattern = words.length > 1
        ? words.map(escapeRegExp).join('\\s*')
        : escapeRegExp(variant);
      corrected = corrected.replace(new RegExp(pattern, 'gi'), target);
    });

  return corrected;
}

function isAllowedCorrection(correctedNorm, allowedNorms){
  if(!allowedNorms) return true;
  if(allowedNorms.has(correctedNorm)) return true;
  return Array.from(allowedNorms).some(expectedNorm => expectedNorm.startsWith(correctedNorm));
}

function applyCorrectionMap(text, allowedNorms=FULL_WORD_NORMS){
  let corrected = applyPhraseCorrections(text, allowedNorms);

  CORRECTION_PHRASES.forEach(({ variant, target }) => {
    const pattern = splitKoreanWords(variant).map(escapeRegExp).join('\\s+');
    const targetNorm = normalizeKoreanText(target);
    if(isAllowedCorrection(targetNorm, allowedNorms)){
      corrected = corrected.replace(new RegExp(pattern, 'gi'), target);
    }
  });

  return splitKoreanWords(corrected).map(word => {
    const normalizedWord = normalizeKoreanText(word);
    if(allowedNorms.has(normalizedWord)) return word;
    const correctedWord = correctionMap[normalizedWord];
    if(correctedWord && isAllowedCorrection(normalizeKoreanText(correctedWord), allowedNorms)){
      return correctedWord;
    }
    return word;
  }).join(' ');
}

function normalizeForComparison(text, allowedNorms=FULL_WORD_NORMS){
  return normalizeKoreanText(applyCorrectionMap(applyPhraseCorrections(text, allowedNorms), allowedNorms));
}

function applyLimitedCorrections(text){
  let corrected = text.replace(/[^\uAC00-\uD7A3a-zA-Z0-9]+/g, ' ').replace(/\s+/g, ' ').trim();
  Object.entries(LIMITED_CORRECTION_MAP)
    .sort((a, b) => normalizeKoreanText(b[0]).length - normalizeKoreanText(a[0]).length)
    .forEach(([variant, target]) => {
      const pattern = splitKoreanWords(variant).map(escapeRegExp).join('\\s*');
      corrected = corrected.replace(new RegExp(pattern, 'gi'), target);
    });
  return corrected;
}

function normalizeLimitedText(text){
  return normalizeKoreanText(applyLimitedCorrections(text));
}

function calculateSimilarity(a, b){
  const left = normalizeKoreanText(a);
  const right = normalizeKoreanText(b);
  if(left === right) return 1;
  if(!left || !right) return 0;

  const distances = Array.from({ length: left.length + 1 }, (_, i) => [i]);
  for(let j = 1; j <= right.length; j++) distances[0][j] = j;

  for(let i = 1; i <= left.length; i++){
    for(let j = 1; j <= right.length; j++){
      const cost = left[i - 1] === right[j - 1] ? 0 : 1;
      distances[i][j] = Math.min(
        distances[i - 1][j] + 1,
        distances[i][j - 1] + 1,
        distances[i - 1][j - 1] + cost
      );
    }
  }

  const maxLength = Math.max(left.length, right.length);
  return (maxLength - distances[left.length][right.length]) / maxLength;
}

function getSegmentThreshold(normLength){
  if(normLength <= 8) return .68;
  if(normLength <= 18) return .70;
  return .75;
}

function getTargetAllowedNorms(targetWindow){
  return new Set(targetWindow.words.map(normalizeKoreanText));
}

function getBestMatchingVerseOrSegment(transcript, targetWindow=getTargetWindow(), precomputedNorm=null){
  const allowedNorms = getTargetAllowedNorms(targetWindow);
  const targetSegments = targetWindow.segments;
  const transcriptNorm = precomputedNorm || normalizeForComparison(transcript, allowedNorms);
  if(!transcriptNorm) return { score: 0, text: '', norm: '', words: [] };

  let best = { score: 0, text: transcript, norm: transcriptNorm, words: splitKoreanWords(transcript) };
  const minLength = Math.max(1, transcriptNorm.length - Math.ceil(transcriptNorm.length * .2));
  const maxLength = transcriptNorm.length + Math.ceil(transcriptNorm.length * .2);

  targetSegments.forEach(segment => {
    if(segment.norm.length < minLength || segment.norm.length > maxLength) return;
    const score = calculateSimilarity(transcriptNorm, segment.norm);
    if(score > best.score){
      best = { ...segment, score };
    }
  });

  return best;
}

function getTokenMatchScore(spoken, expected){
  const spokenNorm = normalizeKoreanText(spoken);
  const expectedNorm = normalizeKoreanText(expected);
  const corrected = correctionMap[spokenNorm];

  if(spokenNorm === expectedNorm) return 1;
  if(corrected){
    const correctedNorm = normalizeKoreanText(corrected);
    if(expectedNorm === correctedNorm || expectedNorm.startsWith(correctedNorm) || correctedNorm.startsWith(expectedNorm)){
      return .98;
    }
  }

  if(spokenNorm.length <= 2 || expectedNorm.length <= 2) return 0;
  const similarity = calculateSimilarity(spokenNorm, expectedNorm);
  const threshold = Math.max(.78, .86 - Math.min(spokenNorm.length, expectedNorm.length) * .01);
  return similarity >= threshold ? similarity : 0;
}

function scoreWordsAgainstAnswer(spokenWords, expectedWords){
  const maxLength = Math.max(spokenWords.length, expectedWords.length);
  let total = 0;

  for(let i = 0; i < maxLength; i++){
    const spoken = spokenWords[i];
    const expected = expectedWords[i];
    if(!spoken || !expected){
      total -= .35;
      continue;
    }
    total += getTokenMatchScore(spoken, expected);
  }

  return total / maxLength;
}

function findBestVerseWindow(spokenWords, targetWindow=getTargetWindow()){
  let best = { score: 0, words: spokenWords };
  const minLength = Math.max(1, spokenWords.length - 2);
  const maxLength = Math.min(targetWindow.words.length, spokenWords.length + 2);

  for(let length = minLength; length <= maxLength; length++){
    for(let start = 0; start <= targetWindow.words.length - length; start++){
      const expectedWords = targetWindow.words.slice(start, start + length);
      const score = scoreWordsAgainstAnswer(spokenWords, expectedWords);
      if(score > best.score){
        best = { score, words: expectedWords };
      }
    }
  }

  return best;
}

function normalizeRecentChunk(chunk, targetWindow=getTargetWindow()){
  return applyLimitedCorrections(chunk.slice(-RECENT_SCORE_CHARS));
}

function scoreRecentChunkAgainstTarget(chunk, targetWindow=getTargetWindow()){
  const normalizedChunk = applyLimitedCorrections(chunk.slice(-RECENT_SCORE_CHARS));
  const normalizedChunkNorm = normalizeKoreanText(normalizedChunk);
  const targetNorm = normalizeKoreanText(targetWindow.words.join(' '));
  const hasStrictWrongExpression = STRICT_WRONG_PATTERNS.some(pattern => normalizeKoreanText(chunk).includes(pattern));
  const accepted = !hasStrictWrongExpression && normalizedChunkNorm.length >= 4 && targetNorm.includes(normalizedChunkNorm);
  return {
    accepted,
    text: normalizedChunk,
    norm: normalizedChunkNorm,
    score: accepted ? 1 : 0,
    stringScore: accepted ? 1 : 0,
    stringMatchText: normalizedChunk,
    matchStart: accepted ? targetNorm.indexOf(normalizedChunkNorm) : -1,
    matchEnd: accepted ? targetNorm.indexOf(normalizedChunkNorm) + normalizedChunkNorm.length : -1,
    hasStrictWrongExpression
  };
}

function isPotentialPrefixOfTarget(norm, targetWindow=getTargetWindow()){
  if(!norm) return true;
  const targetNorm = normalizeKoreanText(targetWindow.words.join(' '));
  return targetWindow.segments.some(segment => segment.norm.startsWith(norm)) || targetNorm.includes(norm);
}

function normalizeTranscriptByVerse(raw, verseIndex=currentVerseIndex){
  const targetWindow = getTargetWindow(verseIndex);
  const mappedText = applyLimitedCorrections(raw);
  const mappedNorm = normalizeKoreanText(mappedText);
  const targetNorm = normalizeKoreanText(targetWindow.words.join(' '));
  const hasStrictWrongExpression = STRICT_WRONG_PATTERNS.some(pattern => normalizeKoreanText(raw).includes(pattern));
  const accepted = !hasStrictWrongExpression && mappedNorm.length >= 4 && targetNorm.includes(mappedNorm);
  if(!mappedNorm){
    return { text: '', norm: '', score: 0, stringScore: 0, hasStrictWrongExpression };
  }
  return {
    accepted,
    text: mappedText,
    norm: mappedNorm,
    score: accepted ? 1 : 0,
    stringScore: accepted ? 1 : 0,
    stringMatchText: mappedText,
    hasStrictWrongExpression
  };
}

function compareWithAnswer(normalizedTranscript){
  return Boolean(normalizedTranscript.accepted);
}

function extractNewChunk(event){
  let finalChunk = '';
  let interimChunk = '';
  for(let i = event.resultIndex; i < event.results.length; i++){
    const text = event.results[i][0].transcript;
    if(event.results[i].isFinal) finalChunk += `${text} `;
    else interimChunk += text;
  }
  return { finalChunk: finalChunk.trim(), interimChunk: interimChunk.trim() };
}

function commitFinalTranscript(chunk){
  if(!chunk) return;
  confirmedTranscript = `${confirmedTranscript} ${chunk}`.replace(/\s+/g, ' ').trim();
  finalText = confirmedTranscript;
  currentInterimTranscript = '';
}

function updateInterimTranscript(chunk){
  currentInterimTranscript = chunk || '';
}

function getRecentTranscriptWindow(){
  return `${confirmedTranscript} ${currentInterimTranscript}`.replace(/\s+/g, ' ').trim().slice(-RECENT_SCORE_CHARS);
}

function updateCurrentVerseFromMatch(result){
  if(!result || typeof result.matchStart !== 'number' || result.matchStart < 0) return;
  const currentVerse = VERSE_CONTEXTS[currentVerseIndex];
  const verseEnd = currentVerse.start + currentVerse.words.length;
  if(result.matchEnd >= verseEnd - 1){
    currentVerseIndex = Math.min(VERSE_CONTEXTS.length - 1, currentVerseIndex + 1);
  }
}

function throttledScoreUpdate(chunk, isInterim=false, gotFinal=false){
  pendingScoreText = chunk;
  pendingScoreIsInterim = isInterim;
  pendingScoreGotFinal = gotFinal;
  const now = Date.now();
  const elapsed = now - lastScoreAt;
  if(elapsed >= SCORE_THROTTLE_MS){
    runScoreUpdate();
    return;
  }
  clearTimeout(pendingScoreTimer);
  pendingScoreTimer = setTimeout(runScoreUpdate, SCORE_THROTTLE_MS - elapsed);
}

function runScoreUpdate(){
  clearTimeout(pendingScoreTimer);
  pendingScoreTimer = null;
  lastScoreAt = Date.now();
  if(!pendingScoreText) return;
  checkSpeech(pendingScoreText, pendingScoreIsInterim, pendingScoreGotFinal);
}

function handleSpeechResult(event){
  if(!micOn || resettingSpeech) return;
  const { finalChunk, interimChunk } = extractNewChunk(event);
  if(finalChunk) commitFinalTranscript(finalChunk);
  updateInterimTranscript(interimChunk);

  const visibleText = `${confirmedTranscript} ${currentInterimTranscript}`.replace(/\s+/g, ' ').trim();
  setRecognized(visibleText || '듣고 있습니다', visibleText ? '' : 'empty');
  throttledScoreUpdate(getRecentTranscriptWindow(), Boolean(interimChunk), Boolean(finalChunk));
}

// 브라우저 콘솔에서 runNormalizationExamples()를 호출해 보정 예시를 빠르게 확인할 수 있다.
// 통과: "우리는 꽹가리가 되고" -> "울리는 꽹과리가 되고"
// 통과: "물에 이행하지 아니하며" -> "무례히 행하지 아니하며"
// 통과: "떨어지지 아니하대" -> "떨어지지 아니하되"
// 탈락: "무례하게 행하지 아니하며"는 "무례히"가 아니므로 오답
function runNormalizationExamples(){
  const examples = [
    ['우리는 꽹가리가 되고', '울리는 꽹과리가 되고', 0],
    ['물에 이행하지 아니하며', '무례히 행하지 아니하며', 4],
    ['떨어지지 아니하대', '떨어지지 아니하되', 7],
    ['운전한 것이 올때에는', '온전한 것이 올 때에는', 9],
    ['강원도 고치고', '방언도 그치고', 7],
    ['예영도 폐하고', '예언도 폐하고', 7]
  ];
  return examples.map(([input, expected, verseIndex]) => ({
    input,
    expected,
    actual: normalizeTranscriptByVerse(input, verseIndex).text,
    pass: normalizeTranscriptByVerse(input, verseIndex).text === expected
  }));
}

function initSpeech(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    $('noSupport').style.display = 'block';
    setStatus('이 브라우저는 음성인식을 지원하지 않습니다', 'bad');
    return false;
  }

  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    resettingSpeech = false;
    setMicUi(true);
  };

  recognition.onresult = handleSpeechResult;

  recognition.onerror = event => {
    if(event.error === 'not-allowed'){
      micOn = false;
      shouldRestart = false;
      resettingSpeech = false;
      stopTimer();
      setMicUi(false);
      setStatus('마이크 권한을 허용해주세요', 'bad');
      return;
    }
    if(event.error !== 'no-speech' && event.error !== 'aborted'){
      setStatus('음성 인식이 잠시 끊겼습니다. 다시 연결합니다', 'on');
    }
  };

  recognition.onend = () => {
    setMicUi(false);
    if(shouldRestart && micOn){
      setTimeout(() => {
        if(shouldRestart && micOn){
          try{ recognition.start(); } catch(e){}
        }
      }, resettingSpeech ? 180 : 300);
    }
  };
  return true;
}

function toggleMic(){
  if(micOn) stopMic();
  else startMic();
}

function startMic(){
  if(!recognition && !initSpeech()) return;
  micOn = true;
  shouldRestart = true;
  startedAt = Date.now();
  resetBufferOnly();
  setStatus('듣는 중입니다. 다시 누르면 종료됩니다', 'on');
  setRecognized('듣고 있습니다', 'empty');
  startTimer();
  setMicUi(true);
  try{ recognition.start(); } catch(e){}
}

function stopMic(){
  micOn = false;
  shouldRestart = false;
  resettingSpeech = false;
  clearTimeout(wrongTimer);
  stopTimer();
  try{ recognition && recognition.stop(); } catch(e){}
  setMicUi(false);
  setStatus('마이크가 꺼졌습니다', '');
}

function checkSpeech(raw, isInterim, gotFinal=false){
  const text = raw.trim();
  const targetWindow = getTargetWindow(currentVerseIndex);
  const normalizedTranscript = scoreRecentChunkAgainstTarget(text, targetWindow);
  const norm = normalizedTranscript.norm;
  liveNorm = norm;
  if(!norm){
    setRecognized('듣고 있습니다', 'empty');
    return;
  }

  setRecognized(normalizedTranscript.text || text, '');
  if(norm.length < 1) return;
  if(norm === lastChecked) return;
  lastChecked = norm;

  if(compareWithAnswer(normalizedTranscript)){
    clearTimeout(wrongTimer);
    updateCurrentVerseFromMatch(normalizedTranscript);
    setStatus('맞게 말하고 있습니다', 'ok');
    setRecognized(normalizedTranscript.text || text, 'ok');
    return;
  }

  clearTimeout(wrongTimer);
  if(isPotentialPrefixOfTarget(norm, targetWindow)){
    setStatus('듣는 중입니다. 이어서 말하세요', 'on');
    return;
  }
  handleWrong();
}

function handleWrong(){
  playWarning();
  clearAllSpeechImmediately();
}

function clearAllSpeechImmediately(){
  clearTimeout(wrongTimer);
  resetBufferOnly();
  setStatus('틀렸습니다. 다시 말하세요', 'bad');
  setRecognized('다시 시작하세요', 'bad');

  // 브라우저 음성인식 내부 확정 결과까지 비우기 위해 세션을 짧게 재시작한다.
  if(micOn && recognition){
    resettingSpeech = true;
    shouldRestart = true;
    try{
      if(recognition.abort) recognition.abort();
      else recognition.stop();
    }catch(e){}
  }

  clearTimeout(clearMessageTimer);
  clearMessageTimer = setTimeout(() => {
    if(micOn){
      setStatus('듣는 중입니다. 다시 말하세요', 'on');
      setRecognized('듣고 있습니다', 'empty');
    }
  }, 700);
}

function resetBufferOnly(){
  finalText = '';
  confirmedTranscript = '';
  currentInterimTranscript = '';
  lastChecked = '';
  liveNorm = '';
  pendingScoreText = '';
  pendingScoreIsInterim = false;
  pendingScoreGotFinal = false;
  currentVerseIndex = 0;
  clearTimeout(pendingScoreTimer);
  pendingScoreTimer = null;
}

function clearAttempt(){
  clearTimeout(wrongTimer);
  resetBufferOnly();
  if(micOn && recognition){
    resettingSpeech = true;
    shouldRestart = true;
    try{
      if(recognition.abort) recognition.abort();
      else recognition.stop();
    }catch(e){}
  }
  if(!micOn){
    setStatus('마이크를 누르면 시작합니다', '');
    setRecognized('말씀을 말하면 여기에 짧게 표시됩니다', 'empty');
  } else {
    setStatus('듣는 중입니다. 다시 말하세요', 'on');
    setRecognized('듣고 있습니다', 'empty');
  }
}

function resetAll(){
  stopMic();
  resetBufferOnly();
  startedAt = null;
  clearTimeout(clearMessageTimer);
  clearTimeout(wrongTimer);
  $('timer').textContent = '00:00';
  setStatus('마이크를 누르면 시작합니다', '');
  setRecognized('말씀을 말하면 여기에 짧게 표시됩니다', 'empty');
}

function setMicUi(on){
  $('micBtn').classList.toggle('listening', on && micOn);
  $('micBtn').setAttribute('aria-label', on && micOn ? '마이크 종료' : '마이크 시작');
}

function setStatus(text, type=''){
  $('status').className = `status ${type}`.trim();
  $('status').textContent = text;
}

function setRecognized(text, type=''){
  $('recognized').className = `recognized ${type}`.trim();
  $('recognized').textContent = text;
}

function startTimer(){
  if(!startedAt) startedAt = Date.now();
  clearInterval(timerId);
  updateTimer();
  timerId = setInterval(updateTimer, 250);
}

function stopTimer(){
  clearInterval(timerId);
  timerId = null;
}

function updateTimer(){
  const total = startedAt ? Math.floor((Date.now() - startedAt) / 1000) : 0;
  $('timer').textContent = `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

function playWarning(){
  playTone(220,.16,'sawtooth',.1);
  setTimeout(() => playTone(170,.18,'sawtooth',.09), 120);
}

function playTone(freq,duration,type,volume){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

if(!window.SpeechRecognition && !window.webkitSpeechRecognition){
  $('noSupport').style.display = 'block';
}
