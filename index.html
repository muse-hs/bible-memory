<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고린도전서 13장 음성 암송</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root{
    --ink:#1a1714;--parchment:#f7f3ec;--warm:#e8e0d0;
    --gold:#b8862a;--gold-light:#d4a84b;
    --ok:#3d7a52;--ok-bg:#eef6f1;
    --bad:#8b3a2a;--bad-bg:#fdf1ee;
    --warn-bg:#fff8ec;--warn:#8a6010;
    --muted:#8a7e6e;--surface:#fffdf8;
    --mic-color:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--parchment);color:var(--ink);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

  header{background:var(--ink);padding:16px 28px;}
  .logo{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--gold-light);}
  .logo-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px;}

  .container{max-width:700px;margin:0 auto;padding:32px 20px 80px;display:flex;flex-direction:column;gap:20px;}

  .no-support{background:var(--bad-bg);border:1px solid #e8c0b0;border-radius:10px;padding:20px 24px;font-size:14px;color:var(--bad);line-height:1.8;display:none;}

  /* 타이머 */
  .timer-bar{
    background:var(--surface);border:1px solid var(--warm);border-radius:12px;
    padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
    gap:16px;
  }
  .timer-display{
    font-family:'Noto Serif KR',serif;font-size:36px;font-weight:700;
    color:var(--ink);letter-spacing:.06em;font-variant-numeric:tabular-nums;
    min-width:100px;
  }
  .timer-display.running{color:var(--mic-color);}
  .timer-display.done{color:var(--ok);}
  .timer-label{font-size:11px;color:var(--muted);margin-top:2px;}

  /* 마이크 섹션 */
  .mic-section{
    background:var(--surface);border:1px solid var(--warm);border-radius:16px;
    padding:36px 24px;display:flex;flex-direction:column;align-items:center;gap:18px;
  }
  .mic-ring{
    width:120px;height:120px;border-radius:50%;background:var(--ink);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;position:relative;transition:transform .15s;
    box-shadow:0 4px 20px rgba(0,0,0,.18);
  }
  .mic-ring:hover{transform:scale(1.05);}
  .mic-ring.listening{background:var(--mic-color);animation:pulse 1.1s infinite;}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.45);}
    50%{box-shadow:0 0 0 24px rgba(192,57,43,0);}
  }
  .mic-icon{font-size:44px;user-select:none;}

  .mic-status{font-size:14px;color:var(--muted);font-weight:500;text-align:center;min-height:22px;}
  .mic-status.listening{color:var(--mic-color);font-weight:700;}
  .mic-status.done{color:var(--ok);font-weight:700;}

  /* 실시간 인식 텍스트 */
  .recognized{
    width:100%;min-height:60px;
    background:var(--parchment);border:1.5px dashed var(--warm);border-radius:10px;
    padding:14px 18px;
    font-family:'Noto Serif KR',serif;font-size:17px;line-height:1.9;
    text-align:center;word-break:keep-all;
    transition:border-color .2s;
  }
  .recognized.listening{border-color:var(--mic-color);}
  .recognized.empty{color:#c0b09a;font-size:14px;font-family:'Noto Sans KR',sans-serif;}
  /* 실시간 단어 색상 */
  .rt-ok {color:var(--ok);}
  .rt-bad{color:var(--mic-color);font-weight:700;}
  .rt-interim{color:var(--muted);font-style:italic;}

  /* 수동 입력 */
  .manual-toggle{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
  .manual-wrap{display:none;width:100%;flex-direction:column;gap:10px;}
  .manual-wrap.show{display:flex;}
  textarea{
    width:100%;min-height:100px;padding:14px;
    font-family:'Noto Serif KR',serif;font-size:17px;line-height:1.8;
    border:2px solid var(--warm);border-radius:8px;
    background:var(--parchment);color:var(--ink);resize:vertical;outline:none;transition:border-color .2s;
  }
  textarea:focus{border-color:var(--gold);}
  textarea::placeholder{color:#c0b09a;font-size:14px;}
  .btn-grade{
    padding:11px 28px;background:var(--ink);color:var(--gold-light);
    border:none;border-radius:8px;font-size:14px;font-weight:700;
    font-family:'Noto Sans KR',sans-serif;cursor:pointer;align-self:flex-start;
  }

  /* 결과 */
  .result{display:none;flex-direction:column;gap:16px;}
  .result.show{display:flex;}

  .banner{border-radius:10px;padding:16px 20px;display:flex;align-items:flex-start;gap:14px;}
  .banner.perfect{background:var(--ok-bg);border:1px solid #aad4ba;}
  .banner.partial {background:var(--warn-bg);border:1px solid #f0d08a;}
  .banner.fail    {background:var(--bad-bg);border:1px solid #e8c0b0;}
  .b-icon{font-size:26px;line-height:1;}
  .b-title{font-size:16px;font-weight:700;margin-bottom:4px;}
  .banner.perfect .b-title{color:var(--ok);}
  .banner.partial  .b-title{color:var(--warn);}
  .banner.fail     .b-title{color:var(--bad);}
  .b-sub{font-size:13px;color:var(--muted);}

  /* 결과 타이머 뱃지 */
  .time-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--warm);border-radius:99px;
    padding:4px 14px;font-size:13px;font-weight:700;color:var(--ink);
    margin-top:6px;
  }

  .sec-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em;margin-bottom:8px;}
  .diff-box,.ans-box{
    font-family:'Noto Serif KR',serif;font-size:16px;line-height:2.1;
    padding:15px 18px;border-radius:8px;
    background:var(--parchment);border:1px solid var(--warm);
  }
  .ch-ok {color:var(--ok);}
  .ch-bad{color:var(--bad);background:#fde4dc;border-radius:2px;text-decoration:line-through;}
  .ans-hl{background:#c8ecd4;border-radius:3px;padding:1px 2px;}

  .btn-retry{
    align-self:flex-start;padding:11px 24px;
    background:none;color:var(--muted);border:1px solid var(--warm);
    border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  }
  .btn-retry:hover{background:var(--warm);color:var(--ink);}
</style>
</head>
<body>
<header>
  <div class="logo">말씀 암송 <span style="font-weight:300;font-size:14px;color:var(--gold);margin-left:6px;">음성 버전</span></div>
  <div class="logo-sub">고린도전서 13장 · 개역개정 · 말하면 바로 채점</div>
</header>

<div class="container">

  <div class="no-support" id="noSupport">
    ⚠️ 이 브라우저는 음성인식을 지원하지 않습니다. Chrome 또는 Edge를 사용해주세요.
  </div>

  <!-- 타이머 -->
  <div class="timer-bar">
    <div>
      <div class="timer-display" id="timerDisplay">00:00</div>
      <div class="timer-label">암송 시간</div>
    </div>
  </div>

  <!-- 마이크 -->
  <div class="mic-section">
    <div class="mic-ring" id="micBtn" onclick="toggleMic()">
      <span class="mic-icon">🎙️</span>
    </div>
    <div class="mic-status" id="micStatus">버튼을 누르고 말씀을 암송하세요</div>

    <div class="recognized empty" id="recognized">말씀을 말하면 여기에 실시간으로 표시됩니다</div>

    <span class="manual-toggle" onclick="toggleManual()">✏️ 직접 입력하기</span>
    <div class="manual-wrap" id="manualWrap">
      <textarea id="manualInput" placeholder="기억나는 부분을 입력하세요 (띄어쓰기 무시)"></textarea>
      <button class="btn-grade" onclick="gradeManual()">채점하기</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="result" id="result">
    <div class="banner" id="banner">
      <div class="b-icon" id="bIcon"></div>
      <div>
        <div class="b-title" id="bTitle"></div>
        <div class="b-sub"   id="bSub"></div>
        <div class="time-badge" id="timeBadge">⏱ 0:00</div>
      </div>
    </div>

    <div>
      <div class="sec-label">인식된 내용 (초록=원문일치 / 빨강=원문에 없음)</div>
      <div class="diff-box" id="diffBox"></div>
    </div>
    <div>
      <div class="sec-label">✦ 원문 (개역개정) — 맞은 부분 초록 표시</div>
      <div class="ans-box" id="ansBox"></div>
    </div>

    <button class="btn-retry" onclick="retry()">🔄 다시 암송하기</button>
  </div>

</div>

  '꽹가리': '꽹과리',
  '꽹관리': '꽹과리',
  '깽과이': '꽹과리'
};

const MURYEHI_CONTEXT_VARIANTS = [
  '물에', '물에이', '물에 희', '물에희', '물에히', '물에힘',
  '물의', '물의이', '물의 희', '물의희', '물의히', '물의힘',
  '무례이', '무례희', '무레히', '무레희', '무래히',
  '무래이', '무레이', '무리히', '무료히', '물레히', '물레희',
  '무대희', '물례희', '물레이', '브레인', '구래힘', '울애기',
  '울레희', '물랭이'
];

// ── 경고음 (Web Audio API) ───────────────────────────────────────
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playWrongSound(){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime+0.18);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.22);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.22);
  } catch(e){}
}
function playCorrectSound(){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime+0.15);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.2);
  } catch(e){}
}

function normalizeSpeechSpaces(text){
  return text.replace(/[\n\r\t]+/g, ' ').replace(/\s+/g, ' ').trim();
}

function escapeRegExp(text){
  return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function splitSpeechWords(text){
  return normalizeSpeechSpaces(text).split(/\s+/).filter(Boolean);
}

function applyLimitedCorrections(text){
  let corrected = normalizeSpeechSpaces(text);

  Object.entries(LIMITED_PHRASE_CORRECTIONS)
    .sort((a, b) => strip(b[0]).length - strip(a[0]).length)
    .forEach(([variant, target]) => {
      const pattern = splitSpeechWords(variant).map(escapeRegExp).join('\\s*');
      corrected = corrected.replace(new RegExp(pattern, 'gi'), target);
    });

  MURYEHI_CONTEXT_VARIANTS.forEach(variant => {
    const pattern = splitSpeechWords(variant).map(escapeRegExp).join('\\s*');
    corrected = corrected.replace(new RegExp(`${pattern}\\s*(?=(?:이\\s*)?행하지)`, 'gi'), '무례히 ');
  });
  corrected = corrected
    .replace(/무례히\s+이\s*행하지/gi, '무례히 행하지')
    .replace(/우리\s+이\s*행하지/gi, '무례히 행하지');

  corrected = splitSpeechWords(corrected).map(word => {
    return LIMITED_WORD_CORRECTIONS[strip(word)] || word;
  }).join(' ');

  corrected = corrected.replace(/((?:울리는\s+)?(?:꽹과리|깽가리|깽다리|꽹가리|꽹관리|깽과이)가?)\s+대구\b/gi, '$1 되고');
  return normalizeSpeechSpaces(corrected);
}

/*
채점용 보정 점검 예시:
- "우리는깽 가리가 되고" -> 내부 비교: "울리는 꽹과리가 되고"
- "물에 행하지 아니하며" -> 내부 비교: "무례히 행하지 아니하며"
- "무례히 행하지 아니하고" -> "아니하고"가 원문에 없으므로 오답 표시
- "물에 물을 마셨습니다" -> "물에" 단독은 보정하지 않으므로 오답 표시
*/

// ── 진동 ─────────────────────────────────────────────────────────
function vibrateWrong(){
  if(navigator.vibrate) navigator.vibrate([80, 40, 80]);
}
function vibrateCorrect(){
  if(navigator.vibrate) navigator.vibrate([30]);
}

// ── 타이머 ───────────────────────────────────────────────────────
let timerInterval = null;
let timerSeconds = 0;
let sessionTime = 0; // 이번 세션 경과 시간

function timerStart(){
  timerSeconds = 0;
  clearInterval(timerInterval);
  document.getElementById('timerDisplay').className = 'timer-display running';
  timerInterval = setInterval(()=>{
    timerSeconds++;
    document.getElementById('timerDisplay').textContent = formatTime(timerSeconds);
  }, 1000);
}
function timerStop(){
  clearInterval(timerInterval);
  sessionTime = timerSeconds;
  document.getElementById('timerDisplay').className = 'timer-display done';
}
function formatTime(s){
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = (s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

// ── 음성인식 ─────────────────────────────────────────────────────
let recognition = null;
let isListening = false;
let finalTranscript = '';
let latestInterimTranscript = '';
let displayTranscript = '';
let scoringTranscript = '';
let silenceTimer = null;
let wrongDisplayIndices = new Set();
let correctDisplayIndices = new Set();
let warnedWrongIndices = new Set();
let interimPreviewStart = null;
let restartWindowStartedAt = 0;
let restartAttempts = 0;
const SILENCE_DECISION_MS = 2200;
const RESTART_WINDOW_MS = 10000;
const MAX_RESTARTS_PER_WINDOW = 5;
const FULL_STRIPPED = strip(FULL);

function buildSpeechEvaluation(rawText){
  const rawDisplayText = normalizeSpeechSpaces(rawText);
  const scoringText = applyLimitedCorrections(rawDisplayText);
  const displayText = scoringText || rawDisplayText;
  return {
    displayText,
    scoringText,
    displayWords: splitSpeechWords(displayText),
    scoringWords: splitSpeechWords(scoringText)
  };
}

function updateLiveTranscripts(rawText){
  const evaluation = buildSpeechEvaluation(rawText);
  displayTranscript = evaluation.displayText;
  scoringTranscript = evaluation.scoringText;
  return evaluation;
}

function getFinalDisplayWordCount(){
  return splitSpeechWords(applyLimitedCorrections(finalTranscript)).length;
}

function isCorrectSpokenChunk(word){
  const normalized = strip(word);
  return normalized.length > 0 && FULL_STRIPPED.includes(normalized);
}

function findCorrectWordIndices(scoringWords){
  const correct = new Set();
  let index = 0;
  while(index < scoringWords.length){
    let matchedLength = 0;
    for(let length = scoringWords.length - index; length >= 1; length--){
      const phrase = strip(scoringWords.slice(index, index + length).join(' '));
      const allowSingle = length > 1 || phrase.length >= 3;
      if(allowSingle && FULL_STRIPPED.includes(phrase)){
        matchedLength = length;
        break;
      }
    }
    if(matchedLength > 0){
      for(let i = index; i < index + matchedLength; i++) correct.add(i);
      index += matchedLength;
    } else {
      index++;
    }
  }
  return correct;
}

function markDisplayRange(start, count, isCorrect){
  for(let i = start; i < start + count; i++){
    if(isCorrect){
      correctDisplayIndices.add(i);
      wrongDisplayIndices.delete(i);
      warnedWrongIndices.delete(i);
    } else {
      wrongDisplayIndices.add(i);
      correctDisplayIndices.delete(i);
      if(!warnedWrongIndices.has(i)){
        warnedWrongIndices.add(i);
        playWrongSound();
      }
    }
  }
}

function clearDisplayMarksFrom(start){
  [wrongDisplayIndices, correctDisplayIndices, warnedWrongIndices].forEach(set => {
    [...set].forEach(index => {
      if(index >= start) set.delete(index);
    });
  });
}

function processSpeechChunk(rawChunk, displayWordOffset){
  const chunk = buildSpeechEvaluation(rawChunk);
  if(!chunk.displayWords.length) return;
  if(isCorrectSpokenChunk(chunk.scoringText)){
    markDisplayRange(displayWordOffset, chunk.displayWords.length, true);
  } else if(chunk.displayWords.length === chunk.scoringWords.length){
    const correctWordIndices = findCorrectWordIndices(chunk.scoringWords);
    chunk.displayWords.forEach((_, index) => {
      markDisplayRange(displayWordOffset + index, 1, correctWordIndices.has(index));
    });
  } else {
    markDisplayRange(displayWordOffset, chunk.displayWords.length, false);
  }

  if(wrongDisplayIndices.size > 0){
    const st = document.getElementById('micStatus');
    st.className = 'mic-status listening';
    st.textContent = '틀린 부분이 있습니다. 멈추지 말고 이어서 암송하세요';
  }
}

function clearWrongState(){
  wrongDisplayIndices.clear();
  correctDisplayIndices.clear();
  warnedWrongIndices.clear();
  interimPreviewStart = null;
}

function evaluateIncomingSpeech(rawText, options={}){
  const { hasInterim = false } = options;
  const evaluation = updateLiveTranscripts(rawText);

  renderRealtime(evaluation, hasInterim);

  if(wrongDisplayIndices.size === 0){
    const st = document.getElementById('micStatus');
    st.className = 'mic-status listening';
    st.textContent = '🔴 듣는 중… 어느 구절부터 말해도 계속 확인합니다';
  }

  return evaluation;
}

function evaluatePauseState(){
  if(!isListening) return;
  if(latestInterimTranscript){
    processSpeechChunk(latestInterimTranscript, getFinalDisplayWordCount());
  }
  const combined = normalizeSpeechSpaces(`${finalTranscript} ${latestInterimTranscript}`);
  const evaluation = evaluateIncomingSpeech(combined, { hasInterim: false });
  if(!evaluation) return;
  renderRealtime(evaluation, false);
}

function scheduleSilenceEvaluation(){
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => {
    if(isListening) evaluatePauseState();
  }, SILENCE_DECISION_MS);
}

function scheduleRecognitionRestart(delay=300){
  const now = Date.now();
  if(!restartWindowStartedAt || now - restartWindowStartedAt > RESTART_WINDOW_MS){
    restartWindowStartedAt = now;
    restartAttempts = 0;
  }
  if(restartAttempts >= MAX_RESTARTS_PER_WINDOW){
    const st = document.getElementById('micStatus');
    st.className = 'mic-status listening';
    st.textContent = '음성 인식이 잠시 불안정합니다. 잠깐 후 자동으로 다시 연결합니다';
    setTimeout(() => {
      if(isListening) scheduleRecognitionRestart(1200);
    }, 1200);
    restartWindowStartedAt = Date.now();
    restartAttempts = 0;
    return;
  }
  restartAttempts++;
  setTimeout(() => {
    if(isListening){
      try{ recognition.start(); }catch(e){}
    }
  }, delay);
}

function initSpeech(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ document.getElementById('noSupport').style.display='block'; return false; }
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = ()=>{
    setListeningUI(true);
  };

  recognition.onresult = (e)=>{
    let interim = '';
    if(interimPreviewStart !== null){
      clearDisplayMarksFrom(interimPreviewStart);
      interimPreviewStart = null;
    }
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal){
        const displayWordOffset = getFinalDisplayWordCount();
        finalTranscript = normalizeSpeechSpaces(`${finalTranscript} ${t}`);
        processSpeechChunk(t, displayWordOffset);
      } else {
        interim += t;
      }
    }
    latestInterimTranscript = normalizeSpeechSpaces(interim);
    if(latestInterimTranscript){
      interimPreviewStart = getFinalDisplayWordCount();
      processSpeechChunk(latestInterimTranscript, interimPreviewStart);
    }
    const combined = normalizeSpeechSpaces(`${finalTranscript} ${latestInterimTranscript}`);
    evaluateIncomingSpeech(combined, { hasInterim: Boolean(latestInterimTranscript) });
    scheduleSilenceEvaluation();
  };

  recognition.onerror = (e)=>{
    if(e.error === 'not-allowed'){
      isListening = false;
      document.getElementById('micStatus').textContent='⚠️ 마이크 권한을 허용해주세요';
      timerStop();
      setListeningUI(false);
      return;
    }
    if(isListening && e.error === 'no-speech'){
      scheduleSilenceEvaluation();
    }
  };

  recognition.onend = ()=>{
    if(isListening) scheduleRecognitionRestart(300);
  };
  return true;
}

function renderRealtime(evaluation, hasInterim){
  const rec = document.getElementById('recognized');
  rec.className = 'recognized' + (isListening ? ' listening' : '');
  if(!evaluation.displayText.trim()){
    rec.className += ' empty';
    rec.textContent = '듣고 있습니다…';
    return;
  }

  let html = '';
  evaluation.displayWords.forEach((word, index) => {
    const isLast = index === evaluation.displayWords.length - 1;
    if(wrongDisplayIndices.has(index)){
      html += `<span class="rt-bad">${word} </span>`;
    } else if(correctDisplayIndices.has(index)){
      html += `<span class="rt-ok">${word} </span>`;
    } else if(isLast && hasInterim){
      html += `<span class="rt-interim">${word} </span>`;
    } else {
      html += `<span>${word} </span>`;
    }
  });
  rec.innerHTML = html;
}

function toggleMic(){
  if(!recognition && !initSpeech()) return;
  if(isListening) stopSession();
  else startListening();
}

function startListening(){
  finalTranscript = '';
  latestInterimTranscript = '';
  displayTranscript = '';
  scoringTranscript = '';
  clearWrongState(true);
  clearTimeout(silenceTimer);
  isListening = true;
  timerStart();
  const rec = document.getElementById('recognized');
  rec.className='recognized empty';
  rec.textContent='듣고 있습니다…';
  document.getElementById('result').classList.remove('show');
  setListeningUI(true);
  try{ recognition.start(); }catch(e){}
}

function stopSession(){
  isListening = false;
  clearTimeout(silenceTimer);
  timerStop();
  try{ recognition.stop(); }catch(e){}
  setListeningUI(false);
  const displayText = displayTranscript.trim();
  const scoreText = scoringTranscript.trim();
  if(scoreText) gradeText(displayText || scoreText, scoreText);
  else document.getElementById('micStatus').textContent='인식된 내용이 없습니다. 다시 시도해보세요.';
}

function completeSession(){
  isListening = false;
  clearTimeout(silenceTimer);
  timerStop();
  try{ recognition.stop(); }catch(e){}
  setListeningUI(false);
  gradeText(displayTranscript.trim() || scoringTranscript.trim(), scoringTranscript.trim());
}

function setListeningUI(on){
  const btn=document.getElementById('micBtn');
  const st=document.getElementById('micStatus');
  if(on){
    btn.classList.add('listening');
    st.className='mic-status listening';
    st.textContent='🔴 듣는 중… 잠깐 멈춰도 세션은 계속 유지됩니다';
  } else {
    btn.classList.remove('listening');
    st.className='mic-status done';
    st.textContent='중지됨 — 다시 누르면 새로 시작합니다';
  }
}

// ── 수동 입력 ─────────────────────────────────────────────────────
function toggleManual(){
  document.getElementById('manualWrap').classList.toggle('show');
}
function gradeManual(){
  const displayText = normalizeSpeechSpaces(document.getElementById('manualInput').value.trim());
  const t = applyLimitedCorrections(displayText);
  if(!t) return;
  timerStop();
  gradeText(displayText, t);
}

// ── 채점 공통 ─────────────────────────────────────────────────────
function strip(s){ return s.replace(/[\s.,!?;:'"·…—\-]/g,''); }

function longestCommonSubstring(a,b){
  const m=a.length,n=b.length;
  let best=0,endA=0,endB=0;
  const dp=new Uint16Array(m*n);
  for(let i=0;i<m;i++){
    for(let j=0;j<n;j++){
      if(a[i]===b[j]){
        const prev=i>0&&j>0?dp[(i-1)*n+(j-1)]:0;
        const v=prev+1; dp[i*n+j]=v;
        if(v>best){best=v;endA=i;endB=j;}
      }
    }
  }
  return{len:best,startA:endA-best+1,endA,startB:endB-best+1,endB};
}

function findMatches(a,b,offA=0,offB=0,res=[]){
  if(a.length===0||b.length===0) return res;
  const r=longestCommonSubstring(a,b);
  if(r.len<2) return res;
  res.push({sA:offA+r.startA,eA:offA+r.endA,sB:offB+r.startB,eB:offB+r.endB});
  findMatches(a.slice(0,r.startA),b.slice(0,r.startB),offA,offB,res);
  findMatches(a.slice(r.endA+1),b.slice(r.endB+1),offA+r.endA+1,offB+r.endB+1,res);
  return res;
}

function buildMap(original){
  const map=[];
  for(let i=0;i<original.length;i++)
    if(!/[\s.,!?;:'"·…—\-]/.test(original[i])) map.push(i);
  return map;
}

function gradeText(raw, scoringRaw=raw){
  const si=strip(scoringRaw), sf=strip(FULL);
  const matches=findMatches(si,sf);
  const mA=new Set(),mB=new Set();
  matches.forEach(({sA,eA,sB,eB})=>{
    for(let i=sA;i<=eA;i++) mA.add(i);
    for(let i=sB;i<=eB;i++) mB.add(i);
  });

  const total=si.length, correct=mA.size;
  const pct=total===0?0:Math.round(correct/total*100);

  let grade,icon,title,sub;
  if(pct===100){grade='perfect';icon='🎯';title='완벽합니다!';sub='원문과 완전히 일치합니다.';}
  else if(pct>=80){grade='partial';icon='👍';title=`거의 다 맞았어요 (${pct}%)`;sub=`${total}자 중 ${correct}자 일치`;}
  else if(pct>=50){grade='partial';icon='📖';title=`절반 이상 맞았어요 (${pct}%)`;sub=`${total}자 중 ${correct}자 일치`;}
  else{grade='fail';icon='✏️';title=`다시 도전해요 (${pct}%)`;sub=`${total}자 중 ${correct}자만 일치했습니다.`;}

  // 최종 결과 소리
  if(pct>=80) playCorrectSound();
  else playWrongSound();

  document.getElementById('banner').className='banner '+grade;
  document.getElementById('bIcon').textContent=icon;
  document.getElementById('bTitle').textContent=title;
  document.getElementById('bSub').textContent=sub;

  // 타이머 뱃지
  const badge = document.getElementById('timeBadge');
  badge.className = 'time-badge';
  badge.textContent = '⏱ ' + formatTime(sessionTime);

  // diff
  const mapI=buildMap(raw);
  const rawArr=[...raw];
  const colI=new Array(raw.length).fill('none');
  mapI.forEach((oi,siIndex)=>{ colI[oi]=mA.has(siIndex)?'ok':'bad'; });
  let diffH='';
  for(let i=0;i<rawArr.length;i++){
    const ch=rawArr[i].replace(/&/g,'&amp;').replace(/</g,'&lt;');
    if(colI[i]==='ok') diffH+=`<span class="ch-ok">${ch}</span>`;
    else if(colI[i]==='bad') diffH+=`<span class="ch-bad">${ch}</span>`;
    else diffH+=ch;
  }
  document.getElementById('diffBox').innerHTML=diffH;

  // 원문 하이라이트
  const mapF=buildMap(FULL);
  const fullArr=[...FULL];
  const colF=new Array(FULL.length).fill('none');
  mapF.forEach((oi,si)=>{ if(mB.has(si)) colF[oi]='hl'; });
  let ansH='';
  for(let i=0;i<fullArr.length;i++){
    const ch=fullArr[i].replace(/&/g,'&amp;').replace(/</g,'&lt;');
    ansH+=colF[i]==='hl'?`<span class="ans-hl">${ch}</span>`:ch;
  }
  document.getElementById('ansBox').innerHTML=ansH;

  document.getElementById('result').classList.add('show');
  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function retry(){
  document.getElementById('result').classList.remove('show');
  isListening = false;
  finalTranscript = '';
  latestInterimTranscript = '';
  displayTranscript = '';
  scoringTranscript = '';
  clearWrongState(true);
  clearTimeout(silenceTimer);
  const rec=document.getElementById('recognized');
  rec.className='recognized empty';
  rec.textContent='말씀을 말하면 여기에 실시간으로 표시됩니다';
  document.getElementById('micStatus').className='mic-status';
  document.getElementById('micStatus').textContent='버튼을 누르고 말씀을 암송하세요';
  timerSeconds=0;
  document.getElementById('timerDisplay').className='timer-display';
  document.getElementById('timerDisplay').textContent='00:00';
  window.scrollTo({top:0,behavior:'smooth'});
}

if(!window.SpeechRecognition&&!window.webkitSpeechRecognition)
  document.getElementById('noSupport').style.display='block';
